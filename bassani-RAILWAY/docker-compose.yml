version: "3.9"

services:

  # ── MongoDB ────────────────────────────────────────────────────────────────
  mongo:
    image: mongo:7
    restart: always
    volumes:
      - mongo_data:/data/db
    networks:
      - bassani
    # No external port — only accessible inside Docker network

  # ── Backend (FastAPI) ──────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: ../Dockerfile
    restart: always
    env_file:
      - ./backend/.env
    depends_on:
      - mongo
    networks:
      - bassani
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app  # hot-reload in dev (remove in prod)
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

volumes:
  mongo_data:
    driver: local

networks:
  bassani:
    driver: bridge
