server {
    listen 80;
    server_name your-domain.com www.your-domain.com;
    # Redirect HTTP → HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name your-domain.com www.your-domain.com;

    # ── SSL (Let's Encrypt via Certbot) ──────────────────────────────────────
    ssl_certificate     /etc/letsencrypt/live/your-domain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/your-domain.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # ── Security headers ─────────────────────────────────────────────────────
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options           DENY                                  always;
    add_header X-Content-Type-Options    nosniff                               always;
    add_header Referrer-Policy           strict-origin-when-cross-origin       always;

    # ── Gzip ─────────────────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript
               application/x-javascript text/xml application/xml
               application/xml+rss text/javascript image/svg+xml;

    # ── PWA: service worker — no cache ───────────────────────────────────────
    location = /sw.js {
        proxy_pass http://localhost:8000;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Service-Worker-Allowed "/";
    }

    # ── PWA: manifest ────────────────────────────────────────────────────────
    location = /manifest.json {
        proxy_pass http://localhost:8000;
        add_header Cache-Control "public, max-age=86400";
        add_header Content-Type  "application/manifest+json";
    }

    # ── API + WebSocket ───────────────────────────────────────────────────────
    location /api/ {
        proxy_pass         http://localhost:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        # Timeouts for long-running requests
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    # ── WebSocket (packing board) ────────────────────────────────────────────
    location /api/packing/ws/ {
        proxy_pass             http://localhost:8000;
        proxy_http_version     1.1;
        proxy_set_header       Upgrade    $http_upgrade;
        proxy_set_header       Connection "upgrade";
        proxy_set_header       Host       $host;
        proxy_read_timeout     3600s;  # keep WS alive for 1 hour
        proxy_send_timeout     3600s;
    }

    # ── Static files (React build + public/) ─────────────────────────────────
    location / {
        proxy_pass         http://localhost:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        # SPA: all routes fall back to index.html
        proxy_intercept_errors on;
        error_page 404 = /index.html;
    }

    # ── Icons / static assets — aggressive cache ──────────────────────────────
    location ~* \.(png|ico|svg|woff2|woff|ttf)$ {
        proxy_pass http://localhost:8000;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # ── Packing board & supervisor (standalone pages) ─────────────────────────
    location ~ ^/(packing-board|supervisor)\.html$ {
        proxy_pass http://localhost:8000;
        add_header Cache-Control "no-cache";  # always fresh
        add_header X-Frame-Options SAMEORIGIN;
    }
}
