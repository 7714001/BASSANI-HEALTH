<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bassani Health · Packing Board</title>
<style>
  :root {
    --green:   #0f6e56;
    --green-l: #E1F5EE;
    --amber:   #d97706;
    --amber-l: #FAEEDA;
    --blue:    #185FA5;
    --blue-l:  #E6F1FB;
    --red:     #dc2626;
    --red-l:   #FCEBEB;
    --gray:    #1e293b;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #0a0f1e;
    color: #fff;
    font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
    height: 100vh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  /* ── Header ── */
  .header {
    background: #0f172a;
    border-bottom: 2px solid var(--green);
    padding: 16px 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
  }
  .logo {
    display: flex;
    align-items: center;
    gap: 14px;
  }
  .logo-icon {
    width: 48px; height: 48px;
    background: var(--green);
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
  }
  .logo-icon svg { width: 26px; height: 26px; }
  .logo-text h1 { font-size: 26px; font-weight: 700; letter-spacing: -0.5px; }
  .logo-text p  { font-size: 14px; color: #64748b; margin-top: 1px; }

  .header-right {
    display: flex;
    align-items: center;
    gap: 24px;
  }
  .clock {
    font-size: 36px;
    font-weight: 700;
    font-variant-numeric: tabular-nums;
    color: #fff;
    letter-spacing: -1px;
  }
  .date-str {
    font-size: 14px;
    color: #64748b;
    text-align: right;
  }
  .live-dot {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 14px;
    color: #4ade80;
    background: rgba(74,222,128,0.1);
    border: 1px solid rgba(74,222,128,0.3);
    border-radius: 99px;
    padding: 6px 14px;
  }
  .live-dot span {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: #4ade80;
    animation: pulse 1.5s infinite;
  }
  @keyframes pulse {
    0%,100% { opacity: 1; }
    50%      { opacity: 0.4; }
  }

  /* ── Stats bar ── */
  .stats-bar {
    background: #0f172a;
    border-bottom: 1px solid #1e293b;
    padding: 12px 32px;
    display: flex;
    gap: 32px;
    flex-shrink: 0;
  }
  .stat {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .stat-num {
    font-size: 28px;
    font-weight: 800;
    line-height: 1;
  }
  .stat-label {
    font-size: 12px;
    color: #64748b;
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }
  .stat-divider {
    width: 1px;
    background: #1e293b;
    align-self: stretch;
  }

  /* ── Board ── */
  .board {
    flex: 1;
    overflow-y: auto;
    padding: 20px 28px;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(560px, 1fr));
    gap: 16px;
    align-content: start;
  }

  /* ── Order card ── */
  .order-card {
    background: #0f172a;
    border-radius: 14px;
    overflow: hidden;
    border: 2px solid transparent;
    transition: all 0.4s ease;
    position: relative;
  }
  .order-card.queued    { border-color: #334155; }
  .order-card.packing   { border-color: var(--amber); box-shadow: 0 0 24px rgba(217,119,6,0.2); }
  .order-card.ready     { border-color: var(--green); box-shadow: 0 0 24px rgba(15,110,86,0.3); }
  .order-card.collected { border-color: #475569; opacity: 0.55; }

  .card-header {
    padding: 14px 18px 10px;
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    border-bottom: 1px solid #1e293b;
  }
  .order-id {
    font-size: 22px;
    font-weight: 800;
    font-family: 'Courier New', monospace;
    letter-spacing: -0.5px;
  }
  .order-id.queued    { color: #94a3b8; }
  .order-id.packing   { color: var(--amber); }
  .order-id.ready     { color: #4ade80; }
  .order-id.collected { color: #475569; }

  .customer-name {
    font-size: 18px;
    font-weight: 600;
    color: #fff;
    margin-top: 2px;
  }
  .customer-city {
    font-size: 12px;
    color: #64748b;
    margin-top: 2px;
  }

  .status-badge {
    padding: 6px 14px;
    border-radius: 99px;
    font-size: 13px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    flex-shrink: 0;
  }
  .status-badge.queued    { background: #1e293b; color: #94a3b8; }
  .status-badge.packing   { background: rgba(217,119,6,0.2); color: #fbbf24; border: 1px solid rgba(217,119,6,0.4); }
  .status-badge.ready     { background: rgba(74,222,128,0.15); color: #4ade80; border: 1px solid rgba(74,222,128,0.3); }
  .status-badge.collected { background: #1e293b; color: #475569; }

  /* ── Packer strip ── */
  .packer-strip {
    padding: 10px 18px;
    background: #0a0f1e;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .packer-label {
    font-size: 12px;
    color: #64748b;
    text-transform: uppercase;
    letter-spacing: 0.1em;
  }
  .packer-name {
    font-size: 22px;
    font-weight: 900;
    letter-spacing: 2px;
    text-transform: uppercase;
  }
  .packer-name.assigned { color: var(--amber); }
  .packer-name.unassigned { color: #334155; font-weight: 400; font-size: 14px; letter-spacing: 0; }

  .units-badge {
    background: #1e293b;
    border-radius: 8px;
    padding: 4px 12px;
    font-size: 14px;
    font-weight: 700;
    color: #94a3b8;
  }
  .units-badge.packing { color: var(--amber); background: rgba(217,119,6,0.1); }
  .units-badge.ready   { color: #4ade80; background: rgba(74,222,128,0.1); }

  /* ── Items ── */
  .items-list {
    padding: 10px 18px 14px;
  }
  .item-row {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 7px 0;
    border-bottom: 1px solid #1e293b;
  }
  .item-row:last-child { border-bottom: none; }
  .item-tick {
    width: 22px; height: 22px;
    border-radius: 5px;
    border: 2px solid #334155;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
  }
  .item-tick.done {
    background: var(--green);
    border-color: var(--green);
  }
  .item-tick.done::after {
    content: '✓';
    font-size: 13px;
    font-weight: 900;
    color: #fff;
  }
  .item-name {
    flex: 1;
    font-size: 14px;
    font-weight: 500;
    color: #e2e8f0;
  }
  .item-name.done { text-decoration: line-through; color: #475569; }
  .item-location {
    font-size: 12px;
    font-family: 'Courier New', monospace;
    color: #be185d;
    background: rgba(190,24,93,0.1);
    border-radius: 5px;
    padding: 2px 8px;
  }
  .item-qty {
    font-size: 18px;
    font-weight: 900;
    color: #fff;
    min-width: 28px;
    text-align: right;
  }
  .item-qty.done { color: #475569; }

  /* ── Progress bar ── */
  .progress-wrap {
    height: 5px;
    background: #1e293b;
  }
  .progress-fill {
    height: 100%;
    transition: width 0.5s ease;
  }
  .progress-fill.packing   { background: var(--amber); }
  .progress-fill.ready     { background: var(--green); }

  /* ── Notes ── */
  .notes-strip {
    padding: 6px 18px;
    background: rgba(220,38,38,0.08);
    border-top: 1px solid rgba(220,38,38,0.2);
    font-size: 12px;
    color: #f87171;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  /* ── Reseller tag ── */
  .reseller-tag {
    font-size: 11px;
    background: rgba(99,52,137,0.2);
    border: 1px solid rgba(99,52,137,0.4);
    color: #c4b5fd;
    border-radius: 99px;
    padding: 2px 8px;
    margin-top: 3px;
    display: inline-block;
  }

  /* ── Empty state ── */
  .empty-state {
    grid-column: 1 / -1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 80px 0;
    color: #334155;
  }
  .empty-state svg { width: 64px; height: 64px; margin-bottom: 16px; }
  .empty-state h2  { font-size: 24px; font-weight: 600; }
  .empty-state p   { font-size: 16px; margin-top: 8px; }

  /* ── Connection lost banner ── */
  .offline-banner {
    display: none;
    position: fixed;
    top: 0; left: 0; right: 0;
    background: var(--red);
    color: #fff;
    text-align: center;
    padding: 12px;
    font-size: 18px;
    font-weight: 700;
    z-index: 100;
  }
  .offline-banner.show { display: block; }

  /* ── Collected fade out ── */
  @keyframes fadeOut {
    from { opacity: 0.55; }
    to   { opacity: 0; height: 0; margin: 0; padding: 0; }
  }
  .order-card.clearing {
    animation: fadeOut 1s ease forwards;
  }

  /* Scrollbar */
  .board::-webkit-scrollbar { width: 6px; }
  .board::-webkit-scrollbar-track { background: transparent; }
  .board::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 3px; }
</style>
</head>
<body>

<div class="offline-banner" id="offline-banner">
  ⚠ Connection lost — reconnecting…
</div>

<!-- Header -->
<div class="header">
  <div class="logo">
    <div class="logo-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2">
        <path d="M12 2L2 7l10 5 10-5-10-5z"/>
        <path d="M2 17l10 5 10-5"/>
        <path d="M2 12l10 5 10-5"/>
      </svg>
    </div>
    <div class="logo-text">
      <h1>Bassani Health</h1>
      <p>Packing Board · Live View</p>
    </div>
  </div>
  <div class="header-right">
    <div>
      <div class="clock" id="clock">--:--:--</div>
      <div class="date-str" id="datestr">—</div>
    </div>
    <div class="live-dot" id="live-dot">
      <span></span> LIVE
    </div>
  </div>
</div>

<!-- Stats bar -->
<div class="stats-bar">
  <div class="stat">
    <div>
      <div class="stat-num" id="stat-queued" style="color:#94a3b8;">0</div>
      <div class="stat-label">Queued</div>
    </div>
  </div>
  <div class="stat-divider"></div>
  <div class="stat">
    <div>
      <div class="stat-num" id="stat-packing" style="color:#fbbf24;">0</div>
      <div class="stat-label">Packing</div>
    </div>
  </div>
  <div class="stat-divider"></div>
  <div class="stat">
    <div>
      <div class="stat-num" id="stat-ready" style="color:#4ade80;">0</div>
      <div class="stat-label">Ready for Collection</div>
    </div>
  </div>
  <div class="stat-divider"></div>
  <div class="stat">
    <div>
      <div class="stat-num" id="stat-units" style="color:#fff;">0</div>
      <div class="stat-label">Total Units Today</div>
    </div>
  </div>
  <div class="stat-divider"></div>
  <div class="stat">
    <div>
      <div class="stat-num" id="stat-collected" style="color:#64748b;">0</div>
      <div class="stat-label">Collected Today</div>
    </div>
  </div>
</div>

<!-- Board -->
<div class="board" id="board">
  <div class="empty-state">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
      <path d="M20 7H4a2 2 0 00-2 2v10a2 2 0 002 2h16a2 2 0 002-2V9a2 2 0 00-2-2z"/>
      <path d="M16 3H8a2 2 0 00-2 2v2h12V5a2 2 0 00-2-2z"/>
    </svg>
    <h2>All clear — no orders in queue</h2>
    <p>New orders will appear here automatically</p>
  </div>
</div>

<script>
// ── State ────────────────────────────────────────────────────────────────────
let orders = {};   // order_id → entry object
let ws = null;

// ── Clock ────────────────────────────────────────────────────────────────────
function updateClock() {
  const now = new Date();
  document.getElementById('clock').textContent =
    now.toLocaleTimeString('en-ZA', { hour12: false });
  document.getElementById('datestr').textContent =
    now.toLocaleDateString('en-ZA', { weekday:'long', day:'numeric', month:'long', year:'numeric' });
}
setInterval(updateClock, 1000);
updateClock();

// ── WebSocket ────────────────────────────────────────────────────────────────
function connect() {
  const proto = location.protocol === 'https:' ? 'wss' : 'ws';
  ws = new WebSocket(`${proto}://${location.host}/api/packing/ws/board`);

  ws.onopen = () => {
    document.getElementById('offline-banner').classList.remove('show');
    document.getElementById('live-dot').style.color = '#4ade80';
  };

  ws.onmessage = (e) => {
    const msg = JSON.parse(e.data);
    if (msg.type === 'ping') return;
    if (msg.type === 'full_state') {
      orders = {};
      msg.data.forEach(entry => orders[entry.order_id] = entry);
    } else if (msg.type === 'entry_update') {
      orders[msg.data.order_id] = msg.data;
    }
    render();
  };

  ws.onclose = () => {
    document.getElementById('offline-banner').classList.add('show');
    document.getElementById('live-dot').style.color = '#ef4444';
    setTimeout(connect, 3000);   // auto-reconnect
  };

  ws.onerror = () => ws.close();
}

// In demo mode (no real server), use mock data
function loadMockData() {
  orders = {
    'ORD-2026-127': {
      order_id: 'ORD-2026-127', customer_name: 'Wellness Pharmacy', customer_city: 'Johannesburg',
      status: 'packing', packer_name: 'THEMBI', total_units: 5, inv_num: 'INV-34685',
      notes: 'Rush — customer waiting',
      is_reseller: true, reseller_name: "Joe's Distribution",
      items: [
        {name:'Tincture 20ml THC', sku:'THC-TINC-20', qty:3, location:'Shelf A-3'},
        {name:'CBD Balm 50ml',     sku:'TOP-BALM-50', qty:2, location:'Shelf E-2'},
      ],
      item_ticks: {'THC-TINC-20': true, 'TOP-BALM-50': false},
    },
    'ORD-2026-128': {
      order_id: 'ORD-2026-128', customer_name: 'Cape Med Dispensary', customer_city: 'Cape Town',
      status: 'queued', packer_name: null, total_units: 5, inv_num: 'INV-34687',
      notes: '',
      is_reseller: false, reseller_name: null,
      items: [{name:'Vape Pen 500mg', sku:'VP-500-MNT', qty:5, location:'Shelf C-2'}],
      item_ticks: {'VP-500-MNT': false},
    },
    'ORD-2026-129': {
      order_id: 'ORD-2026-129', customer_name: 'Pretoria Health Hub', customer_city: 'Pretoria',
      status: 'ready', packer_name: 'SIPHO', total_units: 8, inv_num: 'INV-34688',
      notes: '',
      is_reseller: false, reseller_name: null,
      items: [
        {name:'Tincture 30ml CBD',  sku:'CBD-TINC-30', qty:5, location:'Shelf A-4'},
        {name:'CBD Gummies x20',    sku:'ED-GUMMY-10', qty:3, location:'Shelf D-1'},
      ],
      item_ticks: {'CBD-TINC-30': true, 'ED-GUMMY-10': true},
    },
    'ORD-2026-130': {
      order_id: 'ORD-2026-130', customer_name: 'Sandton Wellness', customer_city: 'Johannesburg',
      status: 'packing', packer_name: 'PRIYA', total_units: 3, inv_num: 'INV-34689',
      notes: '',
      is_reseller: false, reseller_name: null,
      items: [{name:'Flower Amnesia 7g', sku:'FL-AMS-7G', qty:3, location:'Cool Room B-2'}],
      item_ticks: {'FL-AMS-7G': false},
    },
  };
  render();
}

// ── Render ───────────────────────────────────────────────────────────────────
function render() {
  const board = document.getElementById('board');
  const list = Object.values(orders)
    .filter(o => o.status !== 'cleared')
    .sort((a, b) => {
      const priority = {packing:0, ready:1, queued:2, collected:3};
      return (priority[a.status]??9) - (priority[b.status]??9);
    });

  // Stats
  document.getElementById('stat-queued').textContent   = list.filter(o=>o.status==='queued').length;
  document.getElementById('stat-packing').textContent  = list.filter(o=>o.status==='packing').length;
  document.getElementById('stat-ready').textContent    = list.filter(o=>o.status==='ready').length;
  document.getElementById('stat-collected').textContent= list.filter(o=>o.status==='collected').length;
  document.getElementById('stat-units').textContent    = list.reduce((s,o)=>s+(o.total_units||0),0);

  if (list.length === 0) {
    board.innerHTML = `<div class="empty-state">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <path d="M20 7H4a2 2 0 00-2 2v10a2 2 0 002 2h16a2 2 0 002-2V9a2 2 0 00-2-2z"/>
        <path d="M16 3H8a2 2 0 00-2 2v2h12V5a2 2 0 00-2-2z"/>
      </svg>
      <h2>All clear — no orders in queue</h2>
      <p>New picking slips will appear here automatically</p>
    </div>`;
    return;
  }

  board.innerHTML = list.map(o => {
    const ticks   = o.item_ticks || {};
    const done    = Object.values(ticks).filter(Boolean).length;
    const total   = Object.values(ticks).length;
    const pct     = total > 0 ? Math.round(done / total * 100) : 0;
    const st      = o.status;

    return `<div class="order-card ${st}" id="card-${o.order_id}">
      <!-- Progress bar -->
      <div class="progress-wrap">
        <div class="progress-fill ${st}" style="width:${st==='ready'?100:pct}%"></div>
      </div>

      <!-- Header -->
      <div class="card-header">
        <div>
          <div class="order-id ${st}">${o.order_id}</div>
          <div class="customer-name">${o.customer_name}</div>
          <div class="customer-city">${o.customer_city}
            ${o.is_reseller ? `<span class="reseller-tag">via ${o.reseller_name}</span>` : ''}
          </div>
        </div>
        <div style="text-align:right;">
          <div class="status-badge ${st}">${statusLabel(st)}</div>
          <div class="units-badge ${st}" style="margin-top:6px;">${o.total_units} UNITS</div>
          <div style="font-size:11px;color:#475569;margin-top:4px;">${o.inv_num}</div>
        </div>
      </div>

      <!-- Packer strip -->
      <div class="packer-strip">
        <div>
          <div class="packer-label">Packer</div>
          <div class="packer-name ${o.packer_name ? 'assigned' : 'unassigned'}">
            ${o.packer_name || 'Unassigned — awaiting supervisor'}
          </div>
        </div>
        <div style="font-size:12px;color:#64748b;text-align:right;">
          ${done}/${total} items picked
        </div>
      </div>

      <!-- Items -->
      <div class="items-list">
        ${o.items.map(item => {
          const isDone = ticks[item.sku] === true;
          return `<div class="item-row">
            <div class="item-tick ${isDone ? 'done' : ''}"></div>
            <div class="item-name ${isDone ? 'done' : ''}">${item.name}</div>
            <div class="item-location">${item.location}</div>
            <div class="item-qty ${isDone ? 'done' : ''}">${item.qty}</div>
          </div>`;
        }).join('')}
      </div>

      <!-- Notes -->
      ${o.notes ? `<div class="notes-strip">⚠ ${o.notes}</div>` : ''}
    </div>`;
  }).join('');
}

function statusLabel(st) {
  return {
    queued:    '⬜ Queued',
    packing:   '🔵 Packing',
    ready:     '✅ Ready',
    collected: '🏁 Collected',
  }[st] || st;
}

// ── Init ─────────────────────────────────────────────────────────────────────
// Try WebSocket first, fall back to mock data if no server
try {
  connect();
  // If still no data after 2s, load mock
  setTimeout(() => {
    if (Object.keys(orders).length === 0) loadMockData();
  }, 2000);
} catch (e) {
  loadMockData();
}
</script>
</body>
</html>
