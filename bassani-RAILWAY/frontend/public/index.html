<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />

    <!-- PWA / Theme -->
    <meta name="theme-color" content="#0f6e56" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Bassani" />
    <meta name="application-name" content="Bassani Health" />
    <meta name="msapplication-TileColor" content="#0f6e56" />

    <!-- Description / SEO -->
    <meta name="description" content="Bassani Health Internal Operations System" />
    <meta name="robots" content="noindex, nofollow" />

    <!-- Icons -->
    <link rel="icon"             type="image/png" sizes="32x32" href="/icons/favicon-32.png" />
    <link rel="icon"             type="image/png" sizes="16x16" href="/icons/favicon-16.png" />
    <link rel="apple-touch-icon" sizes="180x180"               href="/icons/apple-touch-icon.png" />
    <link rel="manifest"                                        href="/manifest.json" />

    <!-- Safe area insets for notched phones (iPhone X+) -->
    <style>
      body {
        padding-top:    env(safe-area-inset-top);
        padding-bottom: env(safe-area-inset-bottom);
        padding-left:   env(safe-area-inset-left);
        padding-right:  env(safe-area-inset-right);
      }
    </style>

    <title>Bassani Health</title>
  </head>
  <body>
    <noscript>JavaScript is required to run Bassani Health.</noscript>
    <div id="root"></div>

    <!-- Register service worker -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then(reg => console.log('✅ SW registered'))
            .catch(err => console.warn('SW registration failed:', err));
        });
      }
    </script>
  </body>
</html>
